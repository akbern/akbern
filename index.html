<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <script>
        // Set gravity variable
        const gravity = 0.5;

        // Function for updating enemy positions
        function updateEnemyPositions(enemies) {
            enemies.forEach(enemy => {
                enemy.velocityY += gravity; // Apply gravity
                enemy.y += enemy.velocityY; // Update enemy position

                // Check for collision with the ground
                if (enemy.y > groundY) { // Assuming groundY is the y-coordinate of the ground
                    enemy.y = groundY; // Set enemy on ground
                    enemy.velocityY = 0; // Reset velocity
                }
            });
        }

        // Function for detecting collisions between enemies and platforms
        function checkCollision(enemy, platform) {
            // Collision logic
            if (enemy.x < platform.x + platform.width &&
                enemy.x + enemy.width > platform.x &&
                enemy.y < platform.y + platform.height &&
                enemy.y + enemy.height > platform.y) {
                // Collision detected
                enemy.velocityY = 0; // Stop falling
            }
        }
    </script>
